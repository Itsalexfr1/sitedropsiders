name: Dropsiders Mail Sync

on:
  schedule:
    - cron: '*/15 * * * *' # Toutes les 15 minutes
  repository_dispatch:
    types: [sync-mail] # Déclenchement manuel via API (quand vous envoyez un mail)
  workflow_dispatch: # Permet de le lancer à la main sur GitHub si besoin

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install imap mailparser nodemailer

      - name: Run Mail Bridge
        run: node tools/mail_bridge.js
        env:
          MAIL_CONFIG: ${{ secrets.MAIL_CONFIG }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "Dropsiders Bot"
          git config --global user.email "bot@dropsiders.fr"
          git add src/data/emails.json src/data/emails_sent.json
          git commit -m "Auto: Synchronisation des emails [skip ci] [CF-Pages-Skip]" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push origin main
